services:
  - type: web
    name: deepface-api
    runtime: docker
    plan: standard  # min 1GB RAM pour les modèles ML
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: API_SECRET_KEY
        generateValue: true
      - key: DEFAULT_MODEL
        value: ArcFace
      - key: DEFAULT_DETECTOR
        value: opencv
      - key: ENABLE_DEEPFACE_WARMUP
        value: "false"
      - key: CUDA_VISIBLE_DEVICES
        value: ""
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "3"
      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"
      - key: REQUIRE_HMAC
        value: "true"
      - key: HMAC_SECRET
        generateValue: true
      - key: MALLOC_TRIM_THRESHOLD_
        value: "65536"
      - key: ALLOWED_ORIGINS
        value: "https://yourdomain.com"
